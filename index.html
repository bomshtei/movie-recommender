<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 MovieMatch - Find Your Next Watch</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            font-size: 1.1em;
            color: #a0a0a0;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            animation: fadeInUp 0.7s ease-out;
        }

        .form-group {
            margin-bottom: 30px;
            animation: fadeInUp 0.7s ease-out;
            animation-fill-mode: both;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }

        label {
            display: block;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            color: #ffd93d;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .option-btn {
            padding: 12px 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
        }

        .option-btn:hover {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            transform: translateY(-2px);
        }

        .option-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            border-color: transparent;
            color: #1a1a2e;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            animation: fadeInUp 0.9s ease-out;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #e0e0e0;
            border: 2px solid #ff6b6b;
        }

        .btn-secondary:hover {
            background: rgba(255, 107, 107, 0.1);
        }

        .hidden {
            display: none;
        }

        .recommendations {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 25px;
            animation: fadeIn 0.5s ease-out;
        }

        .movie-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .movie-card:hover {
            background: rgba(255, 107, 107, 0.15);
            border-color: #ff6b6b;
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(255, 107, 107, 0.2);
        }

        .movie-poster {
            width: 100%;
            height: 350px;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .movie-info {
            padding: 15px;
        }

        .movie-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2em;
            color: #ffd93d;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .movie-meta {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.75em;
            font-weight: 600;
        }

        .rating {
            color: #ffd93d;
            font-weight: 600;
            font-size: 0.9em;
        }

        .movie-year {
            color: #a0a0a0;
            font-size: 0.85em;
        }

        .no-match {
            text-align: center;
            padding: 40px;
            color: #a0a0a0;
        }

        .no-match p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .reset-link {
            text-align: center;
            margin-top: 30px;
        }

        .reset-link a {
            color: #ff6b6b;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .reset-link a:hover {
            color: #ffd93d;
        }

        .active-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .results-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .results-header h2 {
            margin: 0 !important;
        }

        .filter-tag {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            border-radius: 20px;
            padding: 8px 15px;
            color: #ffd93d;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-tag-remove {
            cursor: pointer;
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 1.1em;
            padding: 0;
            transition: all 0.3s ease;
        }

        .filter-tag-remove:hover {
            color: #ffd93d;
        }

        .match-count {
            text-align: center;
            color: #ffd93d;
            font-size: 1em;
            font-weight: 600;
            margin: 10px 0 0 0;
        }

        .loading-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 25px;
        }

        .skeleton-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 15px;
            overflow: hidden;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .skeleton-poster {
            width: 100%;
            height: 350px;
            background: rgba(255, 255, 255, 0.05);
        }

        .skeleton-info {
            padding: 15px;
        }

        .skeleton-title {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .skeleton-meta {
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 0.8;
            }
        }

        .movie-card {
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            --modal-bg: none;
        }

        .modal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: var(--modal-bg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px) brightness(0.6);
            z-index: -1;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 20px;
            padding: 30px;
            max-width: 1000px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            display: flex;
            gap: 30px;
            z-index: 10;
        }

        .modal-left {
            flex: 0 0 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-right {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2em;
            color: #ff6b6b;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            width: 40px;
            height: 40px;
        }

        .modal-close:hover {
            color: #ffd93d;
        }

        .modal-poster {
            width: 100%;
            max-width: 300px;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden;
        }

        .modal-poster img {
            width: 100%;
        }

        .trailer-container {
            width: 100%;
            margin-bottom: 20px;
        }

        .trailer-container iframe {
            width: 100%;
            height: 400px;
            border: none;
        }

        .trailer-button {
            width: 100%;
            padding: 18px 30px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            border: none;
            border-radius: 12px;
            color: #1a1a2e;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
            font-family: 'Outfit', sans-serif;
        }

        .trailer-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.3);
        }

        .no-trailer {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.2);
            padding: 20px;
            text-align: center;
            color: #a0a0a0;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            color: #ffd93d;
            margin-bottom: 15px;
            text-align: left;
        }

        .modal-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: flex-start;
        }

        .modal-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-item-label {
            color: #a0a0a0;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .modal-item-value {
            color: #ffd93d;
            font-weight: 600;
            font-size: 1.1em;
        }

        .modal-description {
            color: #b0b0b0;
            line-height: 1.8;
            margin-bottom: 20px;
            text-align: left;
        }

        .watch-providers {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 107, 107, 0.2);
        }

        .watch-providers-title {
            color: #ffd93d;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: left;
        }

        .providers-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-start;
            margin-bottom: 15px;
        }

        .provider-item {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 10px;
            padding: 8px 15px;
            color: #ffd93d;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .provider-item:hover {
            background: rgba(255, 107, 107, 0.4);
            border-color: #ffd93d;
            transform: translateY(-2px);
        }

        .no-providers {
            color: #a0a0a0;
            text-align: center;
            font-size: 0.9em;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @media (max-width: 768px) {
            .modal-content {
                flex-direction: column;
                max-width: 90vw;
                gap: 20px;
                padding: 20px;
            }

            .modal-left {
                flex: 1;
            }

            .modal-title {
                text-align: center;
            }

            .modal-meta {
                justify-content: center;
            }

            .modal-description {
                text-align: center;
            }

            .watch-providers-title {
                text-align: center;
            }

            .providers-list {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Setup Modal -->
    <div class="container">
        <header>
            <h1>🎬 MovieMatch</h1>
            <p>Find your perfect movie in seconds</p>
        </header>

        <!-- Quiz Section -->
        <div id="quizSection" class="card">
            <form id="preferenceForm">
                <div class="form-group">
                    <label>What's your mood?</label>
                    <div class="options">
                        <button type="button" class="option-btn" data-mood="uplifting">😊 Uplifting</button>
                        <button type="button" class="option-btn" data-mood="intense">⚡ Intense</button>
                        <button type="button" class="option-btn" data-mood="relaxing">😌 Relaxing</button>
                        <button type="button" class="option-btn" data-mood="thoughtful">🤔 Thoughtful</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Pick a genre</label>
                    <div class="options" id="genreOptions"></div>
                </div>

                <div class="form-group">
                    <label>How long do you want to watch?</label>
                    <div class="options">
                        <button type="button" class="option-btn" data-length="short">🏃 Short (&lt;90min)</button>
                        <button type="button" class="option-btn" data-length="medium">🚶 Medium (90-150min)</button>
                        <button type="button" class="option-btn" data-length="long">🛋️ Long (&gt;150min)</button>
                    </div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn-primary" id="getRecommendation">Get Recommendations</button>
                </div>
            </form>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="hidden">
            <div class="card">
                <div class="results-header">
                    <h2 style="font-family: 'Playfair Display', serif; font-size: 2em; color: #ffd93d; margin-bottom: 20px;">Your Matches</h2>
                    <div id="matchCount" class="match-count" style="display:none;"></div>
                </div>
                <div id="activeFilters" class="active-filters" style="display:none;"></div>
                <div id="recommendationsContainer" class="recommendations"></div>
                <div class="reset-link">
                    <a onclick="resetQuiz()">← Try another search</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Movie Detail Modal -->
    <div id="movieModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-left">
                <div class="modal-poster">
                    <img id="modalPoster" src="" alt="Movie Poster">
                </div>
            </div>
            <div class="modal-right">
                <h2 class="modal-title" id="modalTitle"></h2>
                <div class="modal-meta">
                    <div class="modal-item">
                        <div class="modal-item-label">Rating</div>
                        <div class="modal-item-value" id="modalRating"></div>
                    </div>
                    <div class="modal-item">
                        <div class="modal-item-label">Year</div>
                        <div class="modal-item-value" id="modalYear"></div>
                    </div>
                    <div class="modal-item">
                        <div class="modal-item-label">Runtime</div>
                        <div class="modal-item-value" id="modalLength"></div>
                    </div>
                </div>
                <div class="modal-description" id="modalDescription"></div>
                <div id="trailerContainer" class="trailer-container"></div>
                <div class="watch-providers">
                    <div class="watch-providers-title">Where to Watch</div>
                    <div class="providers-list" id="providersList">
                        <div class="no-providers">Loading streaming options...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ SECURITY NOTE: Your API key is now visible in the code.
        // This is fine for personal projects, but not for production apps.
        const API_KEY = '7c085b6517d8a7a7037bc476f80b3b42'; // TMDB API key
        
        let allMovies = [];
        let selectedPreferences = { moods: [], genres: [], lengths: [] };

        // Genre IDs mapping for TMDB
        const GENRE_IDS = {
            'action': 28,
            'comedy': 35,
            'drama': 18,
            'sci-fi': 878,
            'animation': 16
        };

        const GENRES = ['action', 'comedy', 'drama', 'sci-fi', 'animation'];

        // Auto-initialize on page load
        // Auto-initialize app on page load
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await fetchMovies();
                setupUI();
            } catch (err) {
                alert('Error loading movies: ' + err.message);
                console.error(err);
            }
        });

        async function fetchMovies() {
            const genres = [28, 35, 18, 878, 16]; // action, comedy, drama, sci-fi, animation
            const allMoviesFromGenres = [];

            for (let genreId of genres) {
                try {
                    const url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=en-US&with_genres=${genreId}&page=1`;
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Failed to fetch movies');
                    
                    const data = await response.json();
                    allMoviesFromGenres.push(...data.results);
                } catch (err) {
                    console.error(`Error fetching genre ${genreId}:`, err);
                }
            }

            // Process movies
            allMovies = allMoviesFromGenres.map(movie => ({
                title: movie.title,
                rating: movie.vote_average.toFixed(1),
                genres: movie.genre_ids,
                length: Math.floor(Math.random() * 120) + 80,
                poster: movie.poster_path,
                year: movie.release_date ? movie.release_date.split('-')[0] : 'N/A',
                description: movie.overview,
                original: movie
            })).filter(m => m.poster);

            // Remove duplicates
            const uniqueMovies = [];
            const seenTitles = new Set();
            allMovies.forEach(movie => {
                if (!seenTitles.has(movie.title)) {
                    seenTitles.add(movie.title);
                    uniqueMovies.push(movie);
                }
            });
            allMovies = uniqueMovies;

            // Assign moods based on genre
            allMovies.forEach(movie => {
                if (movie.genres.includes(35)) {
                    movie.mood = 'uplifting';
                } else if (movie.genres.includes(28) || movie.genres.includes(53)) {
                    movie.mood = 'intense';
                } else if (movie.genres.includes(16)) {
                    movie.mood = 'uplifting';
                } else {
                    movie.mood = 'thoughtful';
                }

                if (movie.length < 90) movie.lengthCategory = 'short';
                else if (movie.length < 150) movie.lengthCategory = 'medium';
                else movie.lengthCategory = 'long';
            });
        }

        function setupUI() {
            // Setup genre buttons
            const genreOptions = document.getElementById('genreOptions');
            GENRES.forEach(genre => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'option-btn';
                btn.dataset.genre = genre;
                btn.textContent = genre.charAt(0).toUpperCase() + genre.slice(1);
                genreOptions.appendChild(btn);
            });

            // Setup button listeners
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    
                    const mood = btn.dataset.mood;
                    const genre = btn.dataset.genre;
                    const length = btn.dataset.length;

                    if (mood) {
                        btn.classList.toggle('active');
                        if (btn.classList.contains('active')) {
                            if (!selectedPreferences.moods.includes(mood)) {
                                selectedPreferences.moods.push(mood);
                            }
                        } else {
                            selectedPreferences.moods = selectedPreferences.moods.filter(m => m !== mood);
                        }
                    } else if (genre) {
                        btn.classList.toggle('active');
                        if (btn.classList.contains('active')) {
                            if (!selectedPreferences.genres.includes(genre)) {
                                selectedPreferences.genres.push(genre);
                            }
                        } else {
                            selectedPreferences.genres = selectedPreferences.genres.filter(g => g !== genre);
                        }
                    } else if (length) {
                        btn.classList.toggle('active');
                        if (btn.classList.contains('active')) {
                            if (!selectedPreferences.lengths.includes(length)) {
                                selectedPreferences.lengths.push(length);
                            }
                        } else {
                            selectedPreferences.lengths = selectedPreferences.lengths.filter(l => l !== length);
                        }
                    }
                });
            });

            document.getElementById('getRecommendation').addEventListener('click', getRecommendations);
        }

        function getRecommendations(e) {
            e.preventDefault();
            
            if (selectedPreferences.moods.length === 0 && selectedPreferences.genres.length === 0 && selectedPreferences.lengths.length === 0) {
                alert('Please select at least one preference!');
                return;
            }

            // Build filter based on selected preferences
            let recommendations = allMovies.filter(movie => {
                let matchesMood = selectedPreferences.moods.length === 0 || selectedPreferences.moods.includes(movie.mood);
                let matchesGenre = selectedPreferences.genres.length === 0 || selectedPreferences.genres.some(g => movie.genres.includes(GENRE_IDS[g]));
                let matchesLength = selectedPreferences.lengths.length === 0 || selectedPreferences.lengths.includes(movie.lengthCategory);
                
                return matchesMood && matchesGenre && matchesLength;
            });

            // Fallback: if no results and multiple filters selected, try fewer filters
            if (recommendations.length === 0 && selectedPreferences.genres.length > 0) {
                recommendations = allMovies.filter(m => selectedPreferences.genres.some(g => m.genres.includes(GENRE_IDS[g])));
            }

            if (recommendations.length === 0 && selectedPreferences.moods.length > 0) {
                recommendations = allMovies.filter(m => selectedPreferences.moods.includes(m.mood));
            }

            if (recommendations.length === 0 && selectedPreferences.lengths.length > 0) {
                recommendations = allMovies.filter(m => selectedPreferences.lengths.includes(m.lengthCategory));
            }

            // Last resort
            if (recommendations.length === 0) {
                recommendations = allMovies.slice(0, 12);
            }

            displayRecommendations(recommendations.slice(0, 12));
        }

        function displayRecommendations(recommendations) {
            const container = document.getElementById('recommendationsContainer');
            const filtersList = document.getElementById('activeFilters');
            const matchCountEl = document.getElementById('matchCount');
            
            // Show/hide sections
            document.getElementById('quizSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');
            
            // Show loading skeleton cards
            container.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const skeleton = document.createElement('div');
                skeleton.className = 'skeleton-card';
                skeleton.innerHTML = `
                    <div class="skeleton-poster"></div>
                    <div class="skeleton-info">
                        <div class="skeleton-title"></div>
                        <div class="skeleton-meta"></div>
                    </div>
                `;
                container.appendChild(skeleton);
            }
            
            // Display active filters
            displayActiveFilters(filtersList);
            
            // Display match count
            matchCountEl.textContent = `Found ${recommendations.length} matching movie${recommendations.length !== 1 ? 's' : ''}!`;
            matchCountEl.style.display = 'block';
            
            // Simulate loading time for better UX
            setTimeout(() => {
                container.innerHTML = '';
                
                recommendations.forEach((movie, index) => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.style.animationDelay = `${index * 0.05}s`;
                    
                    const posterUrl = movie.poster 
                        ? `https://image.tmdb.org/t/p/w500${movie.poster}`
                        : 'https://via.placeholder.com/500x750?text=No+Poster';

                    card.innerHTML = `
                        <div class="movie-poster">
                            <img src="${posterUrl}" alt="${movie.title}">
                        </div>
                        <div class="movie-info">
                            <div class="movie-title">${movie.title}</div>
                            <div class="movie-meta">
                                <span class="rating">⭐ ${movie.rating}</span>
                                <span class="movie-year">${movie.year}</span>
                            </div>
                            <div style="font-size: 0.85em; color: #a0a0a0;">⏱️ ~${movie.length} min</div>
                        </div>
                    `;
                    
                    card.addEventListener('click', () => openMovieModal(movie));
                    container.appendChild(card);
                });
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 600);
        }

        function displayActiveFilters(container) {
            container.innerHTML = '';
            const hasFilters = selectedPreferences.moods.length > 0 || 
                               selectedPreferences.genres.length > 0 || 
                               selectedPreferences.lengths.length > 0;
            
            if (!hasFilters) {
                container.style.display = 'none';
                return;
            }
            
            container.style.display = 'flex';
            
            // Display moods
            selectedPreferences.moods.forEach(mood => {
                const tag = createFilterTag(mood, 'mood');
                container.appendChild(tag);
            });
            
            // Display genres
            selectedPreferences.genres.forEach(genre => {
                const tag = createFilterTag(genre, 'genre');
                container.appendChild(tag);
            });
            
            // Display lengths
            selectedPreferences.lengths.forEach(length => {
                const tag = createFilterTag(length, 'length');
                container.appendChild(tag);
            });
        }

        function createFilterTag(value, type) {
            const tag = document.createElement('div');
            tag.className = 'filter-tag';
            
            const text = document.createElement('span');
            text.textContent = value.charAt(0).toUpperCase() + value.slice(1);
            
            const removeBtn = document.createElement('button');
            removeBtn.className = 'filter-tag-remove';
            removeBtn.textContent = '✕';
            removeBtn.onclick = (e) => {
                e.stopPropagation();
                removeFilter(value, type);
            };
            
            tag.appendChild(text);
            tag.appendChild(removeBtn);
            return tag;
        }

        function removeFilter(value, type) {
            if (type === 'mood') {
                selectedPreferences.moods = selectedPreferences.moods.filter(m => m !== value);
            } else if (type === 'genre') {
                selectedPreferences.genres = selectedPreferences.genres.filter(g => g !== value);
            } else if (type === 'length') {
                selectedPreferences.lengths = selectedPreferences.lengths.filter(l => l !== value);
            }
            
            // Update UI
            document.querySelectorAll('.option-btn').forEach(btn => {
                const mood = btn.dataset.mood;
                const genre = btn.dataset.genre;
                const length = btn.dataset.length;
                
                if ((mood && selectedPreferences.moods.includes(mood)) ||
                    (genre && selectedPreferences.genres.includes(genre)) ||
                    (length && selectedPreferences.lengths.includes(length))) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            // Re-fetch recommendations
            getRecommendations({preventDefault: () => {}});
        }

        function resetQuiz() {
            selectedPreferences = { moods: [], genres: [], lengths: [] };
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('quizSection').classList.remove('hidden');
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('activeFilters').style.display = 'none';
            document.getElementById('matchCount').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openMovieModal(movie) {
            const posterUrl = movie.poster 
                ? `https://image.tmdb.org/t/p/w500${movie.poster}`
                : 'https://via.placeholder.com/500x750?text=No+Poster';

            document.getElementById('modalPoster').src = posterUrl;
            document.getElementById('modalTitle').textContent = movie.title;
            document.getElementById('modalRating').textContent = '⭐ ' + movie.rating;
            document.getElementById('modalYear').textContent = movie.year;
            document.getElementById('modalLength').textContent = '~' + movie.length + ' min';
            document.getElementById('modalDescription').textContent = movie.description || 'No description available.';
            
            // Set blurred background image
            const modalElement = document.getElementById('movieModal');
            modalElement.style.setProperty('--modal-bg', `url('${posterUrl}')`);
            
            // Fetch and display trailer
            fetchAndDisplayTrailer(movie.original.id);
            
            // Fetch watch providers with movie title
            fetchWatchProviders(movie.original.id, movie.title);
            
            document.getElementById('movieModal').classList.add('active');
        }

        async function fetchAndDisplayTrailer(movieId) {
            try {
                const url = `https://api.themoviedb.org/3/movie/${movieId}/videos?api_key=${API_KEY}&language=en-US`;
                const response = await fetch(url);
                const data = await response.json();
                
                const trailerContainer = document.getElementById('trailerContainer');
                
                // Find official trailer
                const trailer = data.results.find(video => 
                    video.type === 'Trailer' && video.site === 'YouTube'
                ) || data.results.find(video => 
                    video.site === 'YouTube'
                );
                
                if (trailer) {
                    const youtubeUrl = `https://www.youtube.com/watch?v=${trailer.key}`;
                    trailerContainer.innerHTML = `<a href="${youtubeUrl}" target="_blank" rel="noopener noreferrer" class="trailer-button">🎬 Watch Trailer on YouTube</a>`;
                } else {
                    trailerContainer.innerHTML = '<div class="no-trailer">No trailer available</div>';
                }
            } catch (err) {
                document.getElementById('trailerContainer').innerHTML = '<div class="no-trailer">Unable to load trailer</div>';
            }
        }

        async function fetchWatchProviders(movieId, movieTitle) {
            try {
                const url = `https://api.themoviedb.org/3/movie/${movieId}/watch/providers?api_key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();
                
                const providersList = document.getElementById('providersList');
                providersList.innerHTML = '';
                
                // Get US providers
                const usProviders = data.results?.US;
                
                const streamingLinks = {
                    'Netflix': `https://www.netflix.com/search?q=${encodeURIComponent(movieTitle)}`,
                    'Amazon Prime Video': `https://www.primevideo.com/search?q=${encodeURIComponent(movieTitle)}&tag=movierecomm00-20`,
                    'Disney Plus': `https://www.disneyplus.com/search?q=${encodeURIComponent(movieTitle)}`,
                    'Hulu': `https://www.hulu.com/search?q=${encodeURIComponent(movieTitle)}`,
                    'HBO Max': `https://www.max.com/search?q=${encodeURIComponent(movieTitle)}`,
                    'Apple TV': `https://tv.apple.com/search?term=${encodeURIComponent(movieTitle)}`,
                    'Google Play': `https://play.google.com/store/search?q=${encodeURIComponent(movieTitle)}&c=movies`,
                    'YouTube': `https://www.youtube.com/results?search_query=${encodeURIComponent(movieTitle)}`,
                    'Amazon Video': `https://www.primevideo.com/search?q=${encodeURIComponent(movieTitle)}&tag=movierecomm00-20`
                };
                
                let hasOptions = false;
                
                // Stream (Subscription)
                if (usProviders && usProviders.flatrate) {
                    hasOptions = true;
                    const streamSection = document.createElement('div');
                    streamSection.style.marginBottom = '15px';
                    streamSection.innerHTML = '<div style="color: #a0a0a0; font-size: 0.85em; margin-bottom: 8px; text-align: center;">📺 Stream</div>';
                    
                    const streamList = document.createElement('div');
                    streamList.style.display = 'flex';
                    streamList.style.flexWrap = 'wrap';
                    streamList.style.gap = '10px';
                    streamList.style.justifyContent = 'center';
                    
                    usProviders.flatrate.forEach(provider => {
                        const link = streamingLinks[provider.provider_name];
                        if (link) {
                            const providerLink = document.createElement('a');
                            providerLink.className = 'provider-item';
                            providerLink.textContent = provider.provider_name;
                            providerLink.href = link;
                            providerLink.target = '_blank';
                            providerLink.rel = 'noopener noreferrer';
                            streamList.appendChild(providerLink);
                        }
                    });
                    
                    streamSection.appendChild(streamList);
                    providersList.appendChild(streamSection);
                }
                
                // Rent
                if (usProviders && usProviders.rent) {
                    hasOptions = true;
                    const rentSection = document.createElement('div');
                    rentSection.style.marginBottom = '15px';
                    rentSection.innerHTML = '<div style="color: #a0a0a0; font-size: 0.85em; margin-bottom: 8px; text-align: center;">🎬 Rent</div>';
                    
                    const rentList = document.createElement('div');
                    rentList.style.display = 'flex';
                    rentList.style.flexWrap = 'wrap';
                    rentList.style.gap = '10px';
                    rentList.style.justifyContent = 'center';
                    
                    usProviders.rent.forEach(provider => {
                        const link = streamingLinks[provider.provider_name];
                        if (link) {
                            const providerLink = document.createElement('a');
                            providerLink.className = 'provider-item';
                            providerLink.textContent = provider.provider_name;
                            providerLink.href = link;
                            providerLink.target = '_blank';
                            providerLink.rel = 'noopener noreferrer';
                            rentList.appendChild(providerLink);
                        }
                    });
                    
                    rentSection.appendChild(rentList);
                    providersList.appendChild(rentSection);
                }
                
                // Buy
                if (usProviders && usProviders.buy) {
                    hasOptions = true;
                    const buySection = document.createElement('div');
                    buySection.style.marginBottom = '15px';
                    buySection.innerHTML = '<div style="color: #a0a0a0; font-size: 0.85em; margin-bottom: 8px; text-align: center;">💳 Buy</div>';
                    
                    const buyList = document.createElement('div');
                    buyList.style.display = 'flex';
                    buyList.style.flexWrap = 'wrap';
                    buyList.style.gap = '10px';
                    buyList.style.justifyContent = 'center';
                    
                    usProviders.buy.forEach(provider => {
                        const link = streamingLinks[provider.provider_name];
                        if (link) {
                            const providerLink = document.createElement('a');
                            providerLink.className = 'provider-item';
                            providerLink.textContent = provider.provider_name;
                            providerLink.href = link;
                            providerLink.target = '_blank';
                            providerLink.rel = 'noopener noreferrer';
                            buyList.appendChild(providerLink);
                        }
                    });
                    
                    buySection.appendChild(buyList);
                    providersList.appendChild(buySection);
                }
                
                if (!hasOptions) {
                    providersList.innerHTML = '<div class="no-providers">No watch options available in your region</div>';
                }
            } catch (err) {
                document.getElementById('providersList').innerHTML = '<div class="no-providers">Unable to load watch options</div>';
            }
        }

        function closeModal() {
            document.getElementById('movieModal').classList.remove('active');
        }

        document.getElementById('movieModal').addEventListener('click', (e) => {
            if (e.target.id === 'movieModal') {
                closeModal();
            }
        });
    </script>
</body>
</html>
